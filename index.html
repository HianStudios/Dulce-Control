<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DulceControl & HianStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyBib3D8Kkyr3WHdQpsGEblIxIB5Fh1wtdc",
  authDomain:        "dulce-control-v2.firebaseapp.com",
  projectId:         "dulce-control-v2",
  storageBucket:     "dulce-control-v2.firebasestorage.app",
  messagingSenderId: "205345085452",
  appId:             "1:205345085452:web:ebea4aee83abb116f37629"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let currentWorkspace = null;
let activePage = 'dashboard';

let state = {
  negocio: { ventas: [], compras: [], gastos: [], productos: [] },
  hianstudio: { proyectos: [], ventas: [], gastos: [], agenda: [], recordatorios: [], drive: [] }
};
</script>

<style>
:root {
  --bg:#09090b;--bg2:#121216;--bg3:#1a1a22;--bg4:#22222e;
  --border:#27273a;--border2:#3f3f56;
  --green:#00e676;--green2:#00c853;--green-dim:rgba(0,230,118,0.1);
  --yellow:#ffd740;--yellow-dim:rgba(255,215,64,0.1);
  --red:#ff5252;--red-dim:rgba(255,82,82,0.1);
  --blue:#40c4ff;--blue-dim:rgba(64,196,255,0.1);
  --purple:#b388ff;--purple-dim:rgba(179,136,255,0.1);
  --text:#f4f4f6;--text2:#a1a1b3;--text3:#62627a;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --radius:10px;--radius2:6px;--tr:0.15s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:var(--sans);outline:none;color:inherit}
button{cursor:pointer;border:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* LOADING OVERLAY */
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}
#loading-overlay.hidden{display:none}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;padding:15px}
#login-screen.hidden{display:none}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:25px;width:100%;max-width:350px;display:flex;flex-direction:column;gap:15px}
.brand-title{font-size:2rem;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.field input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:9px 12px;font-size:.9rem}
.field input:focus{border-color:var(--green)}
.btn-block{width:100%;padding:11px;border-radius:var(--radius2);font-weight:700;font-size:.9rem;text-align:center;transition:background var(--tr)}
.btn-primary{background:var(--green);color:#000}.btn-primary:hover{background:var(--green2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--text);color:var(--text)}

/* WORKSPACE SELECTOR */
#workspace-screen{position:fixed;inset:0;background:var(--bg);z-index:1500;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:30px}
#workspace-screen.hidden{display:none}
.workspace-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:550px}
.ws-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;transition:all var(--tr);display:flex;flex-direction:column;align-items:center;gap:12px}
.ws-card:hover{border-color:var(--green);transform:translateY(-2px)}
.ws-icon{font-size:3rem}
.ws-name{font-size:1.3rem;font-weight:700}
.ws-desc{font-size:.8rem;color:var(--text2)}

/* APP LAYOUT — FIX: sidebar usa top/bottom/left correctos */
#app{display:none;min-height:100vh}
#app.visible{display:flex}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:100;transition:transform var(--tr)}
.main-content{margin-left:220px;flex:1;padding:20px;min-height:100vh}

/* SIDEBAR OVERLAY MOBILE */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
#sidebar-overlay.open{display:block}

/* NAV ITEMS */
.sb-header{padding:20px 15px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.sb-nav{flex:1;padding:15px 10px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius2);font-size:.88rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all var(--tr)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--green-dim);color:var(--green)}
.sb-footer{padding:15px 10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}

/* TOPBAR & LAYOUT */
.topbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;position:relative}
.card-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700}
.card-val{font-size:1.4rem;font-weight:800;font-family:var(--mono)}

/* EXCEL-LIKE BOXES */
.excel-box{background:linear-gradient(135deg,var(--bg2),rgba(255,255,255,0.01));border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.excel-title{font-size:.8rem;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:15px}
.excel-row{display:flex;justify-content:space-between;padding:8px 12px;font-size:.9rem;border-bottom:1px dashed var(--border)}
.excel-row:last-of-type{border-bottom:none}
.excel-row.total{font-size:1.6rem;font-weight:800;font-family:var(--mono);color:var(--green);border-top:1px solid var(--border);margin-top:10px;border-bottom:none}

/* TABLES */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.table-title{padding:12px 15px;font-weight:700;font-size:.9rem;background:var(--bg3);border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;text-align:left}
th{background:var(--bg3);padding:10px 12px;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:700}
td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
.num{font-family:var(--mono);font-weight:600}
.text-green{color:var(--green)}
.text-red{color:var(--red)}

/* BADGES */
.badge{padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;display:inline-block}
.b-green{background:var(--green-dim);color:var(--green)}
.b-yellow{background:var(--yellow-dim);color:var(--yellow)}
.b-red{background:var(--red-dim);color:var(--red)}
.b-blue{background:var(--blue-dim);color:var(--blue)}
.b-purple{background:var(--purple-dim);color:var(--purple)}

/* FORMS */
.grid-inputs{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:15px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.7rem;color:var(--text3);text-transform:uppercase;font-weight:700}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 10px;font-size:.85rem}
.form-group input:focus,.form-group select:focus{border-color:var(--green)}

/* POS / CARRITO */
.pos-box{display:grid;grid-template-columns:1fr 320px;gap:20px}
.cart-list{background:var(--bg3);border-radius:var(--radius2);padding:10px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;margin-bottom:10px}
.cart-item{display:flex;justify-content:space-between;font-size:.82rem;background:var(--bg2);padding:6px 10px;border-radius:4px;align-items:center}

/* MISC */
.page{display:none}.page.active{display:block}
.btn-sm{padding:6px 12px;font-size:.75rem;border-radius:var(--radius2);font-weight:600}
.btn-menu{display:none;background:var(--bg3);padding:6px 10px;border-radius:4px;border:1px solid var(--border);color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:16px;left:16px;max-width:340px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:.83rem;font-weight:600;color:var(--text);z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeIn .3s ease;pointer-events:none}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0;padding:12px}
  .btn-menu{display:block}
  .pos-box{grid-template-columns:1fr}
  .workspace-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="brand-title">DulceControl v3</div>
  <div class="spinner"></div>
</div>

<div id="login-screen" class="hidden">
  <div class="login-box">
    <div class="brand-title">DulceControl</div>
    <div style="text-align:center;font-size:.75rem;color:var(--text3);margin-top:-10px;text-transform:uppercase;letter-spacing:1px">Multi-Workspace Core</div>
    <div class="field"><label>Correo</label><input type="email" id="auth-email" placeholder="ejemplo@correo.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
    <div id="auth-error" style="color:var(--red);font-size:.75rem;display:none;background:var(--red-dim);padding:6px;border-radius:4px"></div>
    <button class="btn-block btn-primary" onclick="handleAuth('login')">Entrar</button>
    <button class="btn-block btn-outline" onclick="handleAuth('register')">Crear cuenta</button>
  </div>
</div>

<div id="workspace-screen" class="hidden">
  <div class="brand-title" style="font-size:2.5rem">Seleccionar Espacio</div>
  <div class="workspace-grid">
    <div class="ws-card" onclick="selectWorkspace('negocio')">
      <div class="ws-icon">🏪</div>
      <div class="ws-name">Negocio</div>
      <div class="ws-desc">Excel inteligente, ventas rápidas e inventario automático.</div>
    </div>
    <div class="ws-card" onclick="selectWorkspace('hianstudio')">
      <div class="ws-icon">🎬</div>
      <div class="ws-name">HianStudio</div>
      <div class="ws-desc">Módulo creativo, proyectos, agenda y organización Drive.</div>
    </div>
  </div>
  <button class="btn-outline btn-sm" onclick="doLogout()">🚪 Cerrar sesión</button>
</div>

<!-- FIX: overlay para cerrar sidebar en mobile -->
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="brand-title" id="side-brand" style="text-align:left;font-size:1.2rem">DulceControl</div>
      <div id="user-display" style="font-size:.75rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis">...</div>
    </div>
    <nav class="sb-nav" id="sidebar-menu"></nav>
    <div class="sb-footer">
      <button class="btn-outline btn-sm" style="width:100%" onclick="backToWorkspaces()">🔄 Cambiar Espacio</button>
      <button class="btn-outline btn-sm" style="width:100%;border-color:rgba(255,82,82,0.2);color:var(--red)" onclick="doLogout()">🚪 Salir</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn-menu" onclick="toggleSidebar()">☰</button>
        <h2 id="view-title" style="font-size:1.1rem;font-weight:700">Dashboard</h2>
      </div>
      <div id="sync-indicator" style="font-size:.75rem;color:var(--green);font-family:var(--mono)">● Sincronizado</div>
    </div>
    <div id="pages-container"></div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════
   AUTH & WORKSPACE
═══════════════════════════════════════════════ */
auth.onAuthStateChanged(user => {
  document.getElementById('loading-overlay').classList.add('hidden');
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('user-display').textContent = user.email;
    if (!currentWorkspace) {
      document.getElementById('workspace-screen').classList.remove('hidden');
      document.getElementById('app').classList.remove('visible');
    } else {
      loadWorkspaceData();
    }
  } else {
    currentUser = null;
    currentWorkspace = null;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('workspace-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('visible');
  }
});

function handleAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errBox = document.getElementById('auth-error');
  errBox.style.display = 'none';
  if (!email || !pass) { errBox.textContent = 'Completa todos los campos'; errBox.style.display = 'block'; return; }
  document.getElementById('loading-overlay').classList.remove('hidden');
  const action = type === 'login'
    ? auth.signInWithEmailAndPassword(email, pass)
    : auth.createUserWithEmailAndPassword(email, pass);
  action.catch(err => {
    document.getElementById('loading-overlay').classList.add('hidden');
    errBox.textContent = err.message;
    errBox.style.display = 'block';
  });
}

// FIX: Enter key en login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-pass').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth('login'); });
  document.getElementById('auth-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-pass').focus(); });
});

function doLogout() { auth.signOut(); }

function selectWorkspace(ws) {
  currentWorkspace = ws;
  activePage = 'dashboard';
  document.getElementById('workspace-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('side-brand').textContent = ws === 'negocio' ? '🏪 Negocio' : '🎬 HianStudio';
  buildSidebar();
  loadWorkspaceData();
}

function backToWorkspaces() {
  currentWorkspace = null;
  activePage = 'dashboard';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('workspace-screen').classList.remove('hidden');
}

// FIX: overlay se sincroniza con sidebar
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
}

/* ═══════════════════════════════════════════════
   SIDEBAR DINÁMICO
═══════════════════════════════════════════════ */
const menus = {
  negocio: [
    { id:'dashboard',   label:'Dashboard',   icon:'📊' },
    { id:'ventas',      label:'Ventas',       icon:'🛒' },
    { id:'compras',     label:'Compras',      icon:'📦' },
    { id:'inventario',  label:'Inventario',   icon:'📋' },
    { id:'gastos',      label:'Gastos',       icon:'💸' }
  ],
  hianstudio: [
    { id:'dashboard',      label:'Dashboard',      icon:'📊' },
    { id:'proyectos',      label:'Proyectos',       icon:'📂' },
    { id:'ventas',         label:'Ventas',          icon:'💵' },
    { id:'gastos',         label:'Gastos',          icon:'💸' },
    { id:'agenda',         label:'Agenda',          icon:'📅' },
    { id:'recordatorios',  label:'Recordatorios',   icon:'🔔' },
    { id:'drive',          label:'Drive',           icon:'☁️' }
  ]
};

function buildSidebar() {
  const container = document.getElementById('sidebar-menu');
  container.innerHTML = '';
  menus[currentWorkspace].forEach(m => {
    const div = document.createElement('div');
    div.className = `nav-item ${m.id === activePage ? 'active' : ''}`;
    div.innerHTML = `<span>${m.icon}</span> ${m.label}`;
    div.onclick = () => {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      activePage = m.id;
      // cerrar sidebar mobile
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
      renderLayout();
    };
    container.appendChild(div);
  });
}

/* ═══════════════════════════════════════════════
   FIRESTORE SYNC
═══════════════════════════════════════════════ */
function showSync(saving=false) {
  const ind = document.getElementById('sync-indicator');
  if (saving) { ind.textContent='⏳ Guardando...'; ind.style.color='var(--yellow)'; }
  else        { ind.textContent='● Sincronizado';  ind.style.color='var(--green)'; }
}

function loadWorkspaceData() {
  if (!currentUser || !currentWorkspace) return;
  showSync(true);
  db.collection('usuarios').doc(currentUser.uid)
    .collection('workspaces').doc(currentWorkspace).get()
    .then(doc => {
      if (doc.exists) {
        state[currentWorkspace] = { ...state[currentWorkspace], ...doc.data() };
      } else {
        saveDataLocallyAndCloud();
      }
      renderLayout();
      showSync(false);
    })
    .catch(err => { console.error('Error cargando datos:', err); showSync(false); });
}

function saveDataLocallyAndCloud() {
  if (!currentUser || !currentWorkspace) return;
  showSync(true);
  db.collection('usuarios').doc(currentUser.uid)
    .collection('workspaces').doc(currentWorkspace).set(state[currentWorkspace])
    .then(() => showSync(false))
    .catch(err => console.error('Error guardando:', err));
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

/* ═══════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════ */
function renderLayout() {
  const container = document.getElementById('pages-container');
  const titleMap = { dashboard:'Dashboard', ventas:'Ventas', compras:'Compras', inventario:'Inventario', gastos:'Gastos', proyectos:'Proyectos', agenda:'Agenda', recordatorios:'Recordatorios', drive:'Drive' };
  document.getElementById('view-title').textContent = titleMap[activePage] || activePage;

  /* ── WORKSPACE NEGOCIO ── */
  if (currentWorkspace === 'negocio') {

    if (activePage === 'dashboard') {
      let totalVentas  = state.negocio.ventas.reduce((a,b)=>a+(b.total||0),0);
      let totalCompras = state.negocio.compras.reduce((a,b)=>a+(b.total||0),0);
      let totalGastos  = state.negocio.gastos.reduce((a,b)=>a+(b.monto||0),0);
      let totalReal    = totalVentas - totalCompras - totalGastos;
      let gananciaHoy=0, ventasHoy=0, totalStock=0;
      let hoyStr = new Date().toISOString().split('T')[0];
      state.negocio.ventas.forEach(v=>{ if(v.fecha===hoyStr){ ventasHoy+=v.total; gananciaHoy+=(v.ganancia||0); } });
      state.negocio.productos.forEach(p=>totalStock+=parseInt(p.stock||0));

      container.innerHTML = `
        <div class="excel-box">
          <div class="excel-title">💰 DINERO REAL DEL NEGOCIO (FÓRMULA EXCEL)</div>
          <div class="excel-row"><span>(+) Ventas Totales:</span><span class="num text-green">$${totalVentas.toFixed(2)}</span></div>
          <div class="excel-row text-red"><span>(-) Compras Acumuladas:</span><span class="num">-$${totalCompras.toFixed(2)}</span></div>
          <div class="excel-row text-red"><span>(-) Gastos de Operación:</span><span class="num">-$${totalGastos.toFixed(2)}</span></div>
          <div class="excel-row total" style="color:${totalReal>=0?'var(--green)':'var(--red)'}"><span>= TOTAL REAL DISPONIBLE:</span><span>$${totalReal.toFixed(2)}</span></div>
        </div>
        <div class="cards-grid">
          <div class="card"><div class="card-lbl">Ventas Hoy</div><div class="card-val">$${ventasHoy.toFixed(2)}</div></div>
          <div class="card"><div class="card-lbl">Ganancia Hoy</div><div class="card-val" style="color:var(--green)">$${gananciaHoy.toFixed(2)}</div></div>

/* ═══════════════════════════════════════════════
   LÓGICA NEGOCIO — CARRITO POS
═══════════════════════════════════════════════ */
let tempCart = [];

function initCart() {
  tempCart = [];
  renderCartDOM();
}

function updatePosPrice() {
  const pId = document.getElementById('pos-prod').value;
  const prod = state.negocio.productos.find(p=>p.id===pId);
  if (prod) document.getElementById('pos-price').value = prod.precioVenta;
}

function addToCart() {
  const pId = document.getElementById('pos-prod').value;
  const qty  = parseInt(document.getElementById('pos-qty').value) || 1;
  const customPrice = parseFloat(document.getElementById('pos-price').value) || 0;
  if (!pId) return;
  const prod = state.negocio.productos.find(p=>p.id===pId);
  if (!prod) return;
  const existing = tempCart.find(i=>i.id===pId && i.precioVenta===customPrice);
  if (existing) { existing.qty += qty; }
  else {
    tempCart.push({ id:prod.id, nombre:prod.nombre, qty, precioVenta:customPrice, costoCompra:prod.costoCompra||0 });
  }
  renderCartDOM();
}

function renderCartDOM() {
  const box = document.getElementById('pos-cart-items');
  if (!box) return;
  if (tempCart.length === 0) {
    box.innerHTML = `<div style="color:var(--text3);text-align:center;padding:20px 0;">Carrito vacío</div>`;
    document.getElementById('cart-t-venta').textContent   = '$0.00';
    document.getElementById('cart-t-costo').textContent   = '-$0.00';
    document.getElementById('cart-t-ganancia').textContent = '$0.00';
    return;
  }
  box.innerHTML = tempCart.map((i,idx)=>`
    <div class="cart-item">
      <span>${i.qty}x ${i.nombre}</span>
      <span>
        <span class="num" style="color:var(--blue)">$${(i.precioVenta*i.qty).toFixed(2)}</span>
        <button onclick="removeFromCart(${idx})" style="background:var(--red-dim);color:var(--red);border-radius:4px;padding:2px 6px;margin-left:6px;font-size:.7rem">✕</button>
      </span>
    </div>`).join('');
  let totalVenta  = tempCart.reduce((a,b)=>a+(b.precioVenta*b.qty),0);
  let totalCosto  = tempCart.reduce((a,b)=>a+(b.costoCompra*b.qty),0);
  let ganancia    = totalVenta - totalCosto;
  document.getElementById('cart-t-venta').textContent    = `$${totalVenta.toFixed(2)}`;
  document.getElementById('cart-t-costo').textContent    = `-$${totalCosto.toFixed(2)}`;
  document.getElementById('cart-t-ganancia').textContent = `$${ganancia.toFixed(2)}`;
  document.getElementById('cart-t-ganancia').style.color = ganancia>=0?'var(--green)':'var(--red)';
}

function removeFromCart(idx) {
  tempCart.splice(idx, 1);
  renderCartDOM();
}

// FIX: checkout limpia carrito correctamente y re-renderiza
function checkoutVenta() {
  if (tempCart.length === 0) return;
  let totalVenta = tempCart.reduce((a,b)=>a+(b.precioVenta*b.qty),0);
  let totalCosto = tempCart.reduce((a,b)=>a+(b.costoCompra*b.qty),0);
  let ganancia   = totalVenta - totalCosto;
  const fecha    = document.getElementById('pos-date').value;
  // Descontar inventario
  tempCart.forEach(item=>{
    let p = state.negocio.productos.find(prod=>prod.id===item.id);
    if(p) p.stock = Math.max(0, p.stock - item.qty);
  });
  state.negocio.ventas.push({ fecha, items:[...tempCart], total:totalVenta, ganancia });
  tempCart = [];
  saveDataLocallyAndCloud();
  showToast(`✅ Venta guardada — $${totalVenta.toFixed(2)} | Ganancia: $${ganancia.toFixed(2)}`);
  renderLayout(); // re-renderiza la página de ventas (incluye initCart)
}

/* ═══════════════════════════════════════════════
   LÓGICA NEGOCIO — REGISTROS
═══════════════════════════════════════════════ */
function registrarCompra() {
  const pId      = document.getElementById('compra-prod').value;
  const qty      = parseInt(document.getElementById('compra-qty').value) || 0;
  const costUnit = parseFloat(document.getElementById('compra-cost').value) || 0;
  const fecha    = document.getElementById('compra-date').value;
  if (!pId || qty <= 0) return;
  let p = state.negocio.productos.find(prod=>prod.id===pId);
  if (p) { p.stock = parseInt(p.stock)+qty; p.costoCompra = costUnit; }
  state.negocio.compras.push({ fecha, productoId:pId, productoNombre:p?p.nombre:'Desconocido', qty, costoUnit, total:qty*costUnit });
  saveDataLocallyAndCloud();
  showToast('📦 Compra registrada e inventario actualizado');
  renderLayout();
}

function crearProducto() {
  const name  = document.getElementById('new-p-name').value.trim();
  const price = parseFloat(document.getElementById('new-p-price').value) || 0;
  const stock = parseInt(document.getElementById('new-p-stock').value) || 0;
  if (!name) return;
  state.negocio.productos.push({ id:'p_'+Date.now(), nombre:name, precioVenta:price, stock, costoCompra:0 });
  saveDataLocallyAndCloud();
  showToast(`✅ Producto "${name}" creado`);
  renderLayout();
}

function registrarGasto() {
  const desc  = document.getElementById('g-desc').value.trim();
  const cat   = document.getElementById('g-cat').value;
  const monto = parseFloat(document.getElementById('g-monto').value) || 0;
  const fecha = document.getElementById('g-date').value;
  if (!desc || monto <= 0) return;
  state.negocio.gastos.push({ desc, cat, monto, fecha });
  saveDataLocallyAndCloud();
  showToast('💸 Gasto registrado');
  renderLayout();
}

/* ═══════════════════════════════════════════════
   LÓGICA HIANSTUDIO
═══════════════════════════════════════════════ */
function crearProyectoStudio() {
  const cliente = document.getElementById('pj-client').value.trim();
  const nombre  = document.getElementById('pj-name').value.trim();
  const estado  = document.getElementById('pj-status').value;
  const monto   = parseFloat(document.getElementById('pj-monto').value) || 0;
  const fecha   = document.getElementById('pj-date').value;
  if (!cliente || !nombre) return;
  state.hianstudio.proyectos.push({ cliente, nombre, estado, monto, fecha });
  saveDataLocallyAndCloud();
  showToast('📂 Proyecto añadido');
  renderLayout();
}

function cambiarEstadoProyecto(index) {
  const estados = ['pendiente','progreso','aprobacion','entregado','atrasado'];
  let ci = estados.indexOf(state.hianstudio.proyectos[index].estado);
  state.hianstudio.proyectos[index].estado = estados[(ci+1)%estados.length];
  saveDataLocallyAndCloud();
  renderLayout();
}

function registrarVentaStudio() {
  const cliente  = document.getElementById('vs-client').value.trim();
  const servicio = document.getElementById('vs-service').value.trim();
  const monto    = parseFloat(document.getElementById('vs-monto').value) || 0;
  if (!cliente || monto <= 0) return;
  state.hianstudio.ventas.push({ cliente, servicio, monto });
  saveDataLocallyAndCloud();
  showToast('💵 Ingreso registrado');
  renderLayout();
}

function registrarGastoStudio() {
  const desc  = document.getElementById('hs-g-desc').value.trim();
  const monto = parseFloat(document.getElementById('hs-g-monto').value) || 0;
  if (!desc || monto <= 0) return;
  state.hianstudio.gastos.push({ desc, monto });
  saveDataLocallyAndCloud();
  showToast('💸 Gasto registrado en Studio');
  renderLayout();
}

function crearAgendaStudio() {
  const titulo = document.getElementById('ag-title').value.trim();
  const fecha  = document.getElementById('ag-date').value;
  const hora   = document.getElementById('ag-time').value;
  if (!titulo || !fecha) return;
  state.hianstudio.agenda.push({ titulo, fecha, hora });
  state.hianstudio.agenda.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  saveDataLocallyAndCloud();
  showToast('📅 Reunión agendada');
  renderLayout();
}

function crearRecordatorioStudio() {
  const titulo    = document.getElementById('rec-title').value.trim();
  const prioridad = document.getElementById('rec-priority').value;
  const date      = document.getElementById('rec-date').value;
  if (!titulo) return;
  state.hianstudio.recordatorios.push({ titulo, prioridad, date, done:false });
  saveDataLocallyAndCloud();
  showToast('🔔 Recordatorio añadido');
  renderLayout();
}

function checkRecordatorio(index) {
  state.hianstudio.recordatorios[index].done = !state.hianstudio.recordatorios[index].done;
  saveDataLocallyAndCloud();
  renderLayout();
}

function enlazarDriveStudio() {
  const label = document.getElementById('dr-label').value.trim();
  const url   = document.getElementById('dr-url').value.trim();
  if (!label || !url) return;
  state.hianstudio.drive.push({ label, url });
  saveDataLocallyAndCloud();
  showToast('🔗 Enlace Drive guardado');
  renderLayout();
}
</script>
